
# ---------- Skill Configuration ----------
skill:
  use_skill: true

# ---------- Template Variables ----------
template_overwrite:
  DOC_GEN_LANG: "中文"
  RTL_PATH: "{DUT}"
  FILE_PATH: "{DUT}"
  OUT_PATH: "{OUT}"
  LOG_FILE: "avis.log"
  FANIN_REP: "avis/fanin.rep"

# ---------- Read-only Protected Directories ----------
un_write_dirs:
  - "{DUT}/"
  - "Guide_Doc/"

# ---------- Predefined template ----------
template: "formal_test"

# ---------- TUI Interface Configuration ----------
tui:
  task_width: 50
  console_height: 19
  status_height: 10

# ---------- Hook Configuration ----------
hooks:
  continue: >
    你还没有完成所有任务，请继续。请通过Check和Complete工具来判断你是否完成了当前阶段的任务。
    请认真分析Check和Complete工具的返回结果，并根据反馈调整你的工作，直到所有Check和Complete都通过为止。
    如果出现属性 TRIVIALLY_TRUE，请优先排查 assume 约束是否过强。
    如果出现属性 FALSE，请先判断是环境欠约束还是 RTL 缺陷，再决定修复方向。
    优先使用Complete工具（阶段推进总耗时时间更短），必要时使用Check工具进行阶段检查。

  cagent_init: >
    请通过工具RoleInfo获取你的角色信息和基本指导，然后完成任务。请使用工具ReadTextFile读取文件。

# ============================================================================
# Mission Definition
# ============================================================================
mission:
  name: "{DUT} 形式化验证任务"
  prompt:
    system: |
      # ══════════════════════════════════════════════════════════════
      # 1. CORE IDENTITY
      # ══════════════════════════════════════════════════════════════
      你是一名顶尖的形式化验证架构师，精通 SystemVerilog Assertions (SVA) 和形式化验证工具链。
      你的目标是通过数学证明确保 {DUT} 设计的完备性。Fail 可能意味着 bug——这是验证的价值所在。
      工作环境: UCAgent {Version} + FormalMC (华大九天) | 语言: SystemVerilog/SVA | 文档: Guide_Doc/

      # ══════════════════════════════════════════════════════════════
      # 2. FORMAL VERIFICATION PRINCIPLES (5 条核心原则)
      # ══════════════════════════════════════════════════════════════
      P1-拒绝无效证明: TRIVIALLY_TRUE = 环境缺陷，必须修正约束，不可忽略。
      P2-白盒思维: 通过 wrapper 引出内部指针/状态机/标志位编写精确断言（核心仍围绕功能正确性）。
      P3-协议严谨: 所有 Valid-Ready 接口必须施加稳定性 Assume 约束。
      P4-优先级排除: 验证常规行为时，在前提中排除高优先级信号（flush/clear/bypass）。
      P5-正负向结合: 正向（条件触发→状态变化）+ 负向 Frame Conditions（非条件→$stable）。

      # ══════════════════════════════════════════════════════════════
      # 3. TECHNICAL KNOWLEDGE
      # ══════════════════════════════════════════════════════════════
      **符号化索引 (fv_idx)** — 阵列存储验证必备，需添加三个强制 assume：
        - M_CK_FV_IDX_STABLE: $stable(fv_idx)
        - M_CK_FV_IDX_VALID:  fv_idx < NUM_PORTS  (无 disable iff)
        - M_CK_FV_IDX_KNOWN:  !$isunknown(fv_idx)
      缺失→索引漂移→假阳性。详见 Guide_Doc/sva_property.md。

      **活性证明**: s_eventually / No-Starvation，确保无死锁。
      **覆盖率驱动**: 关键状态（Full/Empty/Hit）必须有 Cover 属性证明可达性。
      **高级 SVA**: s_eventually, $stable, $past, $rose, $fell。

      # ══════════════════════════════════════════════════════════════
      # 4. TOOL REFERENCE (紧凑速查)
      # ══════════════════════════════════════════════════════════════
      | 工具 | 用途 |
      |------|------|
      | CurrentTips | 获取当前阶段任务指导 |
      | Complete | 阶段检查 + 推进（优先使用）|
      | Check | 仅检查不推进 |
      | ReadTextFile | 读取文件 |
      | EditTextFile | 编辑文件（写入、追加、替换） |
      | GenerateChecker | 生成 checker.sv + wrapper.sv |
      | GenerateFormalScript | 生成 TCL 脚本 |
      | RunSkillScript | 执行技能脚本（例如运行形式化验证、生成文档骨架） |
      | SetCurrentStageJournal | 阶段日志记录（推进前必调）|
      | Detail / Status | Mission 详情 / 摘要与阶段状态 |

      # ══════════════════════════════════════════════════════════════
      # 5. WORKFLOW RULES (操作规范)
      # ══════════════════════════════════════════════════════════════
      - 工作流由多个 Stage 组成，按顺序完成。子 Stage 全部完成后父 Stage 才可推进。
      - 优先用 Complete（检查+推进），仅需验证时用 Check（仅检查）。
      - 推进前必须调用 SetCurrentStageJournal 记录阶段日志。
      - 根据 Complete/Check 的结果调整工作，目标是所有检查都通过。
      - 除非 Checker 要求人工确认，否则不需要人工介入或询问。
      - 中途接入时: CurrentTips → Status → AllStageJournal 获取上下文。
      {skill_system}

      **指导文档领域知识速查：**
      - functions_and_checks.md — 功能组规划与高级检测点模式
      - sva_property.md         — SVA 编码规范、活性与环境约束反模式
      - checker_module.md       — Checker 模块结构、时钟与端口规范
      - env_analysis.md         — TRIVIALLY_TRUE 与 FALSE 属性根因分析决策树
      - bug_report.md           — 故障归因聚类与报告结构
      - coi_coverage.md         — COI 概念、映射表与 Cover/Assert 差异
      - formal_summary.md       — 验证总结报告格式
      (均位于 Guide_Doc/ 目录)

      现在调用`CurrentTips`，开启你的验证工作！
    skill_system: |
      - 你可以使用工具`SkillList`来获取所有可用技能的描述以及路径
      - 在使用工具`CurrentTips`获得当前阶段的任务指导后，优先使用工具`SkillList`列举并学习可用技能
      - 在计划通过`Complete`工具推进到下一个阶段前，需要通过工具`CheckSkillUsage`检查技能使用情况
      - 技能中的 `RunSkillScript` 工具可以执行技能脚本，自动生成文档框架，大幅提升效率
    tips:
      allways:
        - "你需要通过Complete工具来判断你是否完成了当前阶段的任务"
        - "你需要完成所有阶段的任务，才算完成整个验证任务"
        - "不清楚目标时，需要通过工具RoleInfo获取角色信息和基本指导"
      random:
        - "如果属性出现 TRIVIALLY_TRUE，说明 assume 约束过强导致环境过约束，需放松约束"
        - "FALSE 属性需区分【环境欠约束】和【RTL 缺陷】，先判断再决定修复方向"
        - "每个 CK 检测点都必须有对应的 SVA 属性实现，不允许遗漏"
        - "可通过 RunSkillScript 执行 `python3 .ucagent/skills/formal/sva-opt/scripts/run_formal_verification.py` 即时验证，无需等待 Check 触发"
        - "判断是否完成阶段任务时，优先使用Complete工具，其次是Check工具"
        - "符号化索引 fv_idx 的三个强制约束（STABLE/VALID/KNOWN）是防止假阳性的关键"
        - "Cover 属性用于证明关键状态可达，防止 assume 过约束导致全量伪通过"

# ---------- MCP Server Configuration ----------
mcp_server:
  init_prompt: >
    请通过工具`RoleInfo`获取你的角色信息和基本指导，然后完成任务。请使用工具`ReadTextFile`读取文件。

# ============================================================================
# Stage Definition — 11-stage progressive formal verification
# ============================================================================
stage:
  - name: requirement_analysis_and_planning
    desc: "需求分析与验证规划"
    skill_list: ["formal/plan"]
    task:
      - "目标：将验证规划写入 `.formal_records.yaml.planning`，并由系统自动渲染 `01_{DUT}_verification_needs_and_plan.md`。"
      - "**首要行动：加载 `formal/plan` 技能并严格按其步骤执行。**"
      - "本阶段只负责维护 YAML 子树 `planning`；`01_{DUT}_verification_needs_and_plan.md` 是派生产物，禁止直接编辑。"
      - "阅读 `{DUT}` 目录下的 README 和 RTL 源文件，提炼项目概述、验证范围、策略、交付物、风险与初步缺陷线索。"
      - "强调形式化验证目标是发现设计缺陷，属性失败（Fail）是重要输出。"
    reference_files:
      - "{DUT}/README.md"
      - "{RTL_PATH}/*.v"
      - "{RTL_PATH}/*.sv"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: planning_structure_check
        clss: "ucagent.checkers.formal.PlanningStructureChecker"
        args:
          dut_name: "{DUT}"

  # ========== Stage 2: DUT Function Understanding ==========
  - name: dut_function_understanding
    desc: "{DUT}功能理解"
    skill_list: ["formal/basic-info"]
    task:
      - "目标：将 DUT 基本信息写入 `.formal_records.yaml.basic_info`，并由系统自动渲染 `02_{DUT}_basic_info.md`。"
      - "**首要行动：加载 `formal/basic-info` 技能并严格按其步骤执行。**"
      - "本阶段只负责维护 YAML 子树 `basic_info`；`02_{DUT}_basic_info.md` 是派生产物，禁止直接编辑。"
      - "通读代码，梳理 input/output、参数、时钟域、复位域、核心功能与潜在明显缺陷。"
      - "禁止直接编辑 Markdown 文档，所有内容必须通过脚本写入 YAML。"
    reference_files:
      - "{DUT}/README.md"
      - "{RTL_PATH}/*.v"
      - "{RTL_PATH}/*.sv"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: basic_info_structure_check
        clss: "ucagent.checkers.formal.BasicInfoStructureChecker"
        args:
          dut_name: "{DUT}"

  # ========== Stage 3: Functional Specification Analysis and Formal Strategy Definition ==========
  - name: functional_specification_analysis
    desc: "功能规格分析与形式化策略定义{COUNT_FG}/{COUNT_FC}/{COUNT_CK}"
    skill_list: ["formal/func-spec"]
    task:
      - "目标：基于 DUT 的基础信息，分批次划分功能组(FG)、功能点(FC)和检测点(CK)，通过脚本写入 `.formal_records.yaml.spec`。"
      - "**首要行动：加载 `formal/func-spec` 技能并严格按其步骤执行。**"
      - "本阶段只负责维护 YAML 子树 `spec`；`03_{DUT}_functions_and_checks.md` 是派生产物，禁止直接编辑。"
      - "参考 `Guide_Doc/functions_and_checks.md` 的标签规范与高级模式。"
    reference_files:
      - "{DUT}/*.md"
      - "{OUT}/02_{DUT}_basic_info.md"
      - "{OUT}/01_{DUT}_verification_needs_and_plan.md"
    output_files:
      - "{OUT}/.formal_records.yaml"
    stage:
      - name: dut_function_grouping
        desc: "DUT功能分组与层次划分{COUNT_FG}"
        task:
          - "按照规范指导划分系统状态与业务逻辑分组：FG-XXX。"
          - "使用 `update_spec.py -action add_fg` 添加每个功能组。"
          - "必须包含 `FG-API`（环境约束）和 `FG-COVERAGE`（可达性覆盖）两个功能组。"
        checker:
          - name: group_structure_check
            clss: "ucagent.checkers.formal.FormalSpecJsonChecker"
            args:
              dut_name: "{DUT}"
              check_level: "fg"
      - name: function_point_definition
        desc: "具体功能点识别与定义{COUNT_FC}"
        task:
          - "将具体业务逻辑拆解到独立的 FC-XXX 单元中。"
          - "使用 `update_spec.py -action add_fc` 为每个 FG 添加功能点。"
          - "确保每个 FG 下至少有一个 FC。"
        checker:
          - name: function_point_check
            clss: "ucagent.checkers.formal.FormalSpecJsonChecker"
            args:
              dut_name: "{DUT}"
              check_level: "fc"
      - name: check_point_design
        desc: "检测点设计与定义{COUNT_CK}"
        skill_list: ["formal/func-spec"]
        task:
          - "目标：为每个具体功能点设计 CK-XXX 属性检查点。"
          - "使用 `update_spec.py -action add_ck` 为每个 FC 添加检测点。"
          - "**强制约束**：每个检测点的 style 必须从 `Assume`/`Seq`/`Comb`/`Cover` 中选取。"
          - "请检查 Safety 和 Liveness 是否齐全，且对所有存在死锁嫌疑的路径增加了 Cover 探测点。"
        checker:
          - name: check_point_check
            clss: "ucagent.checkers.formal.FormalSpecJsonChecker"
            args:
              dut_name: "{DUT}"
              check_level: "ck"
    need_human_check: $(HUMAN_CHECK_CK: false)

    
  # ========== Stage 4: SVA Property Implementation ==========
  - name: property_generation
    desc: "SVA 属性实现与自动同步"
    skill_list: ["formal/sva-gen"]
    task:
      - "目标：将 `.formal_records.yaml.spec` 中的 `sva_body` 占位符替换为真实的 SVA 断言代码。"
      - "**首要行动：加载 `formal/sva-gen` 技能并严格按其步骤执行。**"
      - "本阶段只负责维护 YAML 子树 `spec.*.check_points[*].sva_body`。"
      - "1. 使用 `update_sva_body.py` 脚本为每个检测点填充逻辑。"
      - "2. **禁止直接修改 .sv 文件**，系统会自动 full refresh 渲染生成验证环境。"
      - "3. 参考 `Guide_Doc/sva_property.md` 了解编码规范。"
    reference_files:
      - "{OUT}/.formal_records.yaml"
      - "Guide_Doc/sva_property.md"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: property_structure_check
        clss: "ucagent.checkers.formal.PropertyStructureChecker"
        args:
          dut_name: "{DUT}"


  # ========== Stage 5: Verification Script Generation ==========
  - name: script_generation
    desc: "验证脚本校验"
    skill_list: ["formal/env-config"]
    task:
      - "目标：基于 `.formal_records.yaml.basic_info.clock_reset` 与 `.formal_records.yaml.extra_config.tcl` 自动渲染 `wrapper/checker/formal.tcl`。"
      - "**首要行动：加载 `formal/env-config` 技能并严格按其步骤执行。**"
      - "本阶段只负责确认 `basic_info.clock_reset` 与 `extra_config.tcl`；`formal.tcl`、`wrapper.sv`、`checker.sv` 都是派生产物，禁止直接编辑。"
      - "时钟和复位信号必须在 Stage 2 的 `basic_info.clock_reset` 中明确定义；Stage 5 只渲染，不再推断。"
      - "当 YAML 或模板发生变化时，应以 full refresh 后的生成环境为准。"
      - "完成配置后调用 Check 工具验证生成的 formal 环境可以正常运行。"
    reference_files:
      - "{OUT}/.formal_records.yaml"
      - "{OUT}/tests/{DUT}_checker.sv"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: script_generation_check
        clss: "ucagent.checkers.formal.ScriptGenerationChecker"
        args:
          dut_name: "{DUT}"

  # ========== Stage 6: Verification Environment Debugging and Iterative Fixing ==========
  - name: environment_debugging_iteration
    desc: "验证环境调试与迭代修复{MAX_ITERATION: 5}"
    skill_list:
      - "formal/sva-audit"
    task:
      - "目标：消除所有环境问题（TRIVIALLY_TRUE 和环境相关 FALSE），确保验证环境无过约束/欠约束。"
      - "**首要行动：加载 `formal/sva-audit` 技能并严格按其步骤执行。**"
      - "本阶段主要维护 YAML 子树 `analysis`，必要时联动修正 `spec`。"
      - "1. **环境纠偏**：如果遇到参数未定义（如 WIDTH）或位宽错误，**禁止手动修改 SV 文件**，必须使用 `update_spec.py` 的 `set_param` 或 `add_signal` 动作更新 YAML。"
      - "2. **分析填写**：使用 `update_analysis.py` 脚本为每个异常属性填写分析详情。"

    reference_files:
      - "{OUT}/.formal_records.yaml"
      - "{OUT}/tests/{LOG_FILE}"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/{DUT}_wrapper.sv"
      - "Guide_Doc/env_analysis.md"
    output_files:
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/{DUT}_wrapper.sv"
    checker:
      - name: environment_analysis_check
        clss: "ucagent.checkers.formal.EnvironmentAnalysisChecker"
        args:
          dut_name: "{DUT}"
          accepted_ratio_threshold: 100.0

  # ========== Stage 7: Coverage Analysis and Assertion Optimization ==========
  - name: coverage_analysis_and_optimization
    desc: "覆盖率分析与断言优化"
    skill_list: ["formal/sva-opt"]
    task:
      - "目标：分析 fanin 覆盖率报告，为未覆盖信号补充断言以提升 COI。"
      - "**首要行动：加载 `formal` 目录下技能并按其步骤执行。**"
      - "本阶段主要维护 YAML 子树 `spec` 与对应 `sva_body`，不要直接编辑 `checker.sv`。"
    reference_files:
      - "{OUT}/tests/{FANIN_REP}"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/.formal_records.yaml"
    output_files:
      - "{OUT}/tests/{DUT}_checker.sv"
    checker:
      - name: property_structure_check
        clss: "ucagent.checkers.formal.PropertyStructureChecker"
        args:
          dut_name: "{DUT}"
      - name: coverage_analysis_check
        clss: "ucagent.checkers.formal.CoverageAnalysisChecker"
        args:
          dut_name: "{DUT}"
          coi_threshold: 90.0


  # ========== Stage 8: Counterexample Python Test Generation ==========
  - name: counterexample_python_testgen
    desc: "形式化反例 Python 测试用例生成"
    skill_list:
      - "formal/cex-gen"
    task:
      - "目标：为 RTL_BUG 属性编写引脚级 Python 测试用例复现 Bug。"
      - "**首要行动：加载 `formal/cex-gen` 技能并完善测试逻辑。**"
      - "注：Checker 已自动生成 `{OUT}/tests/test_{DUT}_counterexample.py` 骨架，你只需填充引脚驱动和断言。"
    reference_files:
      - "{OUT}/.formal_records.yaml"
      - "Guide_Doc/counterexample.md"
      - "{OUT}/tests/{DUT}_checker.sv"
      - "{OUT}/tests/{DUT}_wrapper.sv"
      - "{OUT}/tests/{LOG_FILE}"
    output_files:
      - "{OUT}/tests/test_{DUT}_counterexample.py"
    checker:
      - name: counterexample_testgen_check
        clss: "ucagent.checkers.formal.CounterexampleTestgenChecker"
        args:
          dut_name: "{DUT}"
    ignore: $(CEX_CHECK: true)
  # ========== Stage 9: RTL Defect Analysis and Reporting ==========
  # (Renumbered from Stage 10 after merging env-gen into property_generation)
  - name: formal_execution
    desc: "RTL缺陷分析与报告"
    skill_list:
      - "formal/bug-report"
    task:
      - "目标：对 RTL_BUG 属性进行深度分析并生成 BUG 报告。"
      - "**首要行动：加载 `formal/bug-report` 技能并填充 Bug 详情。**"
      - "本阶段只负责维护 YAML 子树 `bugs`；`04_{DUT}_bug_report.md` 是派生产物。"
      - "注：Checker 已自动在 .formal_records.yaml 中为所有 RTL_BUG 生成了 Bug 报告骨架，你只需通过 `update_bug.py` 脚本开始填写即可。"
    reference_files:
      - "Guide_Doc/bug_report.md"
      - "{OUT}/.formal_records.yaml"
      - "{OUT}/tests/{LOG_FILE}"
      - "{OUT}/tests/{DUT}_checker.sv"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: bug_report_consistency_check
        clss: "ucagent.checkers.formal.BugReportConsistencyChecker"
        args:
          dut_name: "{DUT}"

  - name: static_bug_validation
    desc: "静态分析Bug与形式化验证结果关联"
    task:
      - "目标：将静态Bug分析阶段发现的潜在Bug与形式化验证结果进行关联，建立标签追踪链接，消除所有<LINK-BUG-[BG-TBD]>占位标签"
      - "第1步：扫描{OUT}/04_{DUT}_static_bug_analysis.md，列出所有<BG-STATIC-*>条目及其<LINK-BUG-[BG-TBD]>标签，确认每个待关联的静态Bug"
      - "第2步：读取{OUT}/tests/{LOG_FILE}和{OUT}/04_{DUT}_bug_report.md，提取形式化验证已证实的RTL缺陷列表"
      - "  - 从 {LOG_FILE} 提取所有FALSE状态的属性"
      - "  - 从bug_report.md提取所有<BG-*>标签及其详细信息"
      - "第3步：建立静态Bug与形式化Bug的关联映射"
      - "  对于每个<BG-STATIC-*>静态Bug，执行以下判断："
      - "  情况A - 已被形式化验证证实："
      - "    1. 检查该静态Bug对应的检测点（<CK-*>）是否有FALSE属性"
      - "    2. 检查bug_report.md中是否有相同根因的Bug记录"
      - "    3. 将'<LINK-BUG-[BG-TBD]>'替换为对应的形式化Bug标签，例如：<LINK-BUG-[BG-SUM-WIDTH-001]>"
      - "    4. 若对应多个形式化Bug：<LINK-BUG-[BG-XXX-001][BG-XXX-002]>"
      - "  情况B - 未被形式化验证发现（误报）："
      - "    1. 将'<LINK-BUG-[BG-TBD]>'替换为'<LINK-BUG-[BG-NA]>'"
      - "    2. 在标签下方可选添加误判说明（如'- 误判说明：形式化验证未发现此问题，可能为防御性代码或设计意图'）"
      - "  情况C - 静态Bug标记为无Bug（如<BG-STATIC-002-NO-BUG>）："
      - "    1. 确保<LINK-BUG-[BG-NA]>已正确设置"
      - "第4步：更新{OUT}/04_{DUT}_static_bug_analysis.md文档末尾的汇总表格"
      - "  - 更新'动态Bug关联'列（实际为'形式化Bug关联'）"
      - "  - 统计：证实数、误报数、无Bug数"
      - "第5步：评估静态分析效果"
      - "  - 证实比例 = 证实的静态Bug数 / 发现的潜在Bug总数"
      - "  - 误报比例 = 误报数 / 发现的潜在Bug总数"
      - "  - 在文档末尾添加评估结论"
      - "**重要说明**："
      - "  - 形式化验证通过SVA断言严格证明设计正确性，FALSE属性即为真实的RTL缺陷"
      - "  - 静态分析基于代码审查，可能存在误报，这是正常现象"
      - "  - 阶段完成时{OUT}/04_{DUT}_static_bug_analysis.md中不允许有任何<LINK-BUG-[BG-TBD]>残留"
      - "  - <LINK-BUG-*>标签仅在静态分析文档中使用，不出现在bug_report.md中"
      - "  - 所有文档内容使用{DOC_GEN_LANG}编写"
    reference_files:
      - "{OUT}/04_{DUT}_static_bug_analysis.md"
      - "{OUT}/04_{DUT}_bug_report.md"
      - "{OUT}/tests/{LOG_FILE}"
    output_files:
      - "{OUT}/04_{DUT}_static_bug_analysis.md"
    checker:
      - name: static_formal_bug_linkage_check
        clss: "ucagent.checkers.formal.StaticFormalBugLinkageChecker"
        args:
          dut_name: "{DUT}"
    ignore: $(IGNORE_STATIC_CHECK: true)
          
  # ========== Stage 11: Verification Summary and Review ==========
  - name: verification_review_and_summary
    desc: "验证总结与审查"
    skill_list: ["formal/summary"]
    task:
      - "目标：将最终总结写入 `.formal_records.yaml.summary`，并自动渲染 `05_{DUT}_formal_summary.md`。"
      - "**首要行动：加载 `formal/summary` 技能并严格按其步骤执行。**"
      - "本阶段只负责维护 YAML 子树 `summary`；`05_{DUT}_formal_summary.md` 是派生产物，禁止直接编辑。"
      - "结合 `run_results`、覆盖率、Bug 报告与验证规划，填写总体结果、完备性评估、严重漏洞汇总和验收结论。"
      - "禁止直接编辑 Markdown 总结文档。"
    reference_files:
      - "{OUT}/01_{DUT}_verification_needs_and_plan.md"
      - "{OUT}/tests/{LOG_FILE}"
      - "{OUT}/tests/{FANIN_REP}"
      - "{OUT}/.formal_records.yaml"
      - "{OUT}/tests/test_{DUT}_counterexample.py"
      - "Guide_Doc/formal_summary.md"
    output_files:
      - "{OUT}/.formal_records.yaml"
    checker:
      - name: formal_summary_check
        clss: "ucagent.checkers.formal.FormalSummaryChecker"
        args:
          dut_name: "{DUT}"

################## Check Fail LLM & Complete Pass LLM 配置 ##################

vmanager:
  llm_suggestion:
    check_fail_refinement:
      system_prompt: >
        你是一名资深的形式化验证专家，负责协助另一位 LLM 专家（当前 DUT 为 `{DUT}`）完成形式化验证工作。
        验证过程分为多个阶段，每个阶段结束后需要通过 'Check' 工具进行检查。
        你的任务是分析当前阶段 Check 未通过的原因，然后提供精准的改进建议。
        在分析时，请重点关注以下形式化验证常见问题：
        1. **TRIVIALLY_TRUE**：assume 约束过强导致属性无法被有效触发，需放松约束
        2. **环境欠约束**：缺少必要的 assume，导致工具找到不真实的反例
        3. **SVA 语法错误**：Comb 风格中误用时序操作符、缺少时钟定义等
        4. **符号化索引遗漏**：使用 fv_idx 但未添加三个强制约束
        5. **覆盖率不足**：缺少 Cover 属性导致无法证明关键状态可达
        在你的建议中：
        1. 必须保留检查失败数据中的关键信息
        2. 提出的解决方案应清晰且可操作
        3. 优先考虑对通过检查影响最大的建议
        4. 不要在最终建议中包含思考过程，只提供可操作的建议
        注意事项：
          你的工具调用配额有限，请明智使用。
          高级任务的目标是完成 {DUT} 的形式化验证，确保所有属性通过证明或已正确分类。
      suggestion_prompt: >
        当前形式化验证阶段未通过检查（Check Fail），请分析上述的检查信息，提供精准的改进建议以通过检查。
        请特别关注：TRIVIALLY_TRUE 问题、FALSE 属性分类、SVA 语法合规性、符号化索引约束完整性。
    check_pass_refinement: # Complete Pass 时调用的 LLM 评审专家
      system_prompt: >
        你是一名形式化验证质量评审专家，擅长识别验证环境中的问题，对属性完备性有极高的质量标准。
        现在有另外一位 LLM 形式化验证专家正在对 DUT（{DUT}）进行形式化验证工作。
        在每个关键阶段结束时，它需要你对结果进行评估。只有在你确认没有问题后，它才能继续后续阶段。
        你的具体职责如下：
        (1) 明确当前阶段的具体任务，并根据阶段要求定义评估标准
        (2) 检查属性完备性：安全性 (Safety)、活性 (Liveness)、覆盖率 (Cover) 三类是否齐备
        (3) 检查属性与规划文档 (03_...md) 中 CK 检测点的一致性
        (4) 如果发现问题，提供清晰且可操作的改进建议
        (5) 如果没有发现问题，调用工具 `ApproveStagePass` 批准当前阶段通过
        (6) 防止 LLM 验证专家为了通过 Checker 检查而忽略了实际的验证工作
        重要说明：
        • 你非常重视确保没有功能点遗漏
        • 检查 SVA 代码的风格标注是否与规划文档一致
        • 你的建议应简明扼要，避免冗长
      suggestion_prompt: >
        当前 LLM 形式化验证专家已完成当前阶段的任务。
        请根据上述要求评估任务是否已正确完成。
        若发现任何问题，请提供清晰且可操作的改进建议。
        你必须使用 `ApproveStagePass` 批准或不批准当前阶段通过。
